{% extends 'base.html' %}

{% block title %}Entrar - VerticeBook{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass-card">
        <h2>Entrar</h2>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type|default:'text' }}" name="{{ field.name }}" id="{{ field.id_for_label }}" required>
                    {% if field.errors %}
                        <small style="color: var(--secondary);">{{ field.errors|striptags }}</small>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Entrar</button>
        </form>
        <div class="auth-footer">
            <p>Não tem uma conta? <a href="{% url 'register' %}">Registre-se</a></p>
        </div>
    </div>
</div>
{% endblock %}

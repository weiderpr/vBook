{% load static i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>{{ title }} - VerticeBook</title>
    <link rel="manifest" href="/book/static/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0072ff;
            --primary-light: #00c6ff;
            --bg-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); padding: 1.5rem; padding-top: 4.5rem; }

        .header {
            position: fixed; top: 0; left: 0; width: 100%; padding: 1rem 1.5rem;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px);
            z-index: 100; display: flex; align-items: center; gap: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .back-btn {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
        }

        .title { font-size: 1.1rem; font-weight: 700; }

        .list-container { display: flex; flex-direction: column; gap: 1rem; }

        .res-card {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.25rem; border-radius: 20px; text-decoration: none; color: inherit;
            display: flex; flex-direction: column; gap: 0.5rem;
            transition: var(--transition);
        }

        .res-card:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.08); }

        .res-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .res-name { font-size: 1.1rem; font-weight: 700; }
        .res-property { font-size: 0.85rem; color: var(--primary-light); font-weight: 600; }
        .res-date { font-size: 0.8rem; color: var(--text-dim); }

        .empty-state { text-align: center; margin-top: 5rem; color: var(--text-dim); }
    </style>
</head>
<body>
    <header class="header">
        <a href="{% url 'mobile:home' %}" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        <h1 class="title">{{ title }}</h1>
    </header>

    <div class="list-container">
        {% for res in reservations %}
            <div class="res-card">
                <div class="res-header">
                    <div>
                        <div class="res-name">{{ res.client_name }}</div>
                        <div class="res-property">{{ res.property.name }}</div>
                    </div>
                </div>
                <div class="res-date">
                    {{ res.start_date|date:"d/m" }} - {{ res.end_date|date:"d/m" }}
                </div>
            </div>
        {% empty %}
            <div class="empty-state">
                <p>Nenhuma reserva para hoje.</p>
            </div>
        {% endfor %}
    </div>
</body>
</html>

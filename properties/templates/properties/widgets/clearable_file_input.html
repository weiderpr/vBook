{% load i18n %}
<div class="custom-file-input-wrapper">
  {% if widget.is_initial %}
    <div class="current-file-preview">
      <div class="preview-thumb">
        <img src="{{ widget.value.url }}" alt="{% trans 'Atual' %}">
      </div>
      <div class="file-info">
        <a href="{{ widget.value.url }}" target="_blank">{% trans "Ver imagem atual" %}</a>
        {% if not widget.required %}
          <div class="clear-checkbox">
            <input type="checkbox" name="{{ widget.checkbox_name }}" id="{{ widget.checkbox_id }}"{% if widget.attrs.disabled %} disabled{% endif %}>
            <label for="{{ widget.checkbox_id }}">{% trans "Remover imagem" %}</label>
          </div>
        {% endif %}
      </div>
    </div>
    <div class="change-file-label">{% trans "Alterar imagem:" %}</div>
  {% endif %}
  <div class="file-input-field">
    <input type="{{ widget.type }}" name="{{ widget.name }}"{% include "django/forms/widgets/attrs.html" %}>
    <div class="input-overlay">
       <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-upload-cloud"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></svg>
       <span>{% trans "Clique ou arraste para enviar uma nova foto" %}</span>
    </div>
  </div>
</div>
